<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joe's Weekly Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
  }
  h1 { margin-bottom: 10px; }
  .week-nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  button {
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background: #ddd;
  }
  .day-card {
    background: #fff;
    padding: 15px;
    margin-bottom: 18px;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .day-header {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .section-title {
    font-weight: 600;
    margin-top: 10px;
    margin-bottom: 6px;
  }
  .check-item {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .check-item input {
    margin-right: 10px;
    transform: scale(1.3);
  }
  .completed {
    background: #d9fdd3;
  }
  .streak-box {
    background: #fff;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    font-size: 18px;
    font-weight: 600;
  }
</style>
</head>
<body>

<h1>Joe’s Weekly Tracker</h1>

<div class="streak-box">
  Streak: <span id="streak">0</span> days
</div>

<div class="week-nav">
  <button id="prevWeek">Prev</button>
  <div id="weekLabel"></div>
  <button id="nextWeek">Next</button>
</div>

<div id="weekContainer"></div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }

  const supplementItems = [
    { id: "eatStart", label: "Start eating window (12pm)" },
    { id: "eatEnd", label: "Close eating window (6pm)" },
    { id: "creatine", label: "Morning — Creatine + Black Coffee" },
    { id: "protein", label: "12pm — Protein Shake" },
    { id: "k2", label: "Dinner — K2 (200mcg)" },
    { id: "d3", label: "Dinner — D3 (4000 IU)" }
  ];

  let currentWeekOffset = 0;

  function getMonday(d) {
    d = new Date(d);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
  }

  function getWeekKey() {
    const monday = getMonday(new Date(Date.now() + currentWeekOffset * 7 * 86400000));
    return monday.toISOString().slice(0, 10);
  }

  function loadWeek() {
    const weekKey = getWeekKey();
    const monday = new Date(weekKey);
    document.getElementById("weekLabel").textContent =
      `Week of ${monday.toLocaleDateString()}`;

    const saved = JSON.parse(localStorage.getItem("week_" + weekKey)) || {};
    const container = document.getElementById("weekContainer");
    container.innerHTML = "";

    const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

    days.forEach((day, i) => {
      const card = document.createElement("div");
      card.className = "day-card";
      card.id = `day_${i}`;

      const header = document.createElement("div");
      header.className = "day-header";
      header.textContent = day;
      card.appendChild(header);

      const eatTitle = document.createElement("div");
      eatTitle.className = "section-title";
      eatTitle.textContent = "Eating Window";
      card.appendChild(eatTitle);

      supplementItems.slice(0,2).forEach(item => {
        const wrap = document.createElement("label");
        wrap.className = "check-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.dataset.day = i;
        checkbox.dataset.id = item.id;

        if (saved[i] && saved[i][item.id]) checkbox.checked = true;

        wrap.appendChild(checkbox);
        wrap.appendChild(document.createTextNode(item.label));
        card.appendChild(wrap);
      });

      const suppTitle = document.createElement("div");
      suppTitle.className = "section-title";
      suppTitle.textContent = "Supplements";
      card.appendChild(suppTitle);

      supplementItems.slice(2).forEach(item => {
        const wrap = document.createElement("label");
        wrap.className = "check-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.dataset.day = i;
        checkbox.dataset.id = item.id;

        if (saved[i] && saved[i][item.id]) checkbox.checked = true;

        wrap.appendChild(checkbox);
        wrap.appendChild(document.createTextNode(item.label));
        card.appendChild(wrap);
      });

      container.appendChild(card);
    });

    updateCompletion();
  }
